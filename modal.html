
    <!-- Video Face Swap Modal -->
    <style>
        .swap-modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center;
        }
        .swap-modal-content {
            background: #1a1a1a; width: 100%; max-width: 1000px; max-height: 90vh; border-radius: 16px; display: flex; flex-direction: row; overflow: hidden; position: relative; margin: 16px;
        }
        @media (max-width: 768px) {
            .swap-modal-content { flex-direction: column; overflow-y: auto; }
            .swap-modal-video { max-height: 50vh; }
        }
    </style>
    <div id="videoSwapModal" class="swap-modal-overlay">
        <div class="swap-modal-content">
            <!-- Close Button -->
            <button onclick="document.getElementById('videoSwapModal').style.display='none'" style="position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.5); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; z-index: 10;">?</button>

            <!-- Video Player (Left side) -->
            <div class="swap-modal-video" style="flex: 2; background: #000; display: flex; align-items: center; justify-content: center; position: relative;">
                <video id="modalVideoPlayer" autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: contain;"></video>
            </div>

            <!-- Controls (Right side) -->
            <div style="flex: 1; padding: 24px; display: flex; flex-direction: column; gap: 24px; overflow-y: auto; background: #1a1a1a;">
                <h2 style="margin: 0; font-size: 20px; font-weight: 700; color: white;" id="modalTemplateTitle">Template Title</h2>
                
                <div style="background: #2a2a2a; padding: 16px; border-radius: 12px;">
                    <h3 style="margin: 0 0 12px 0; font-size: 14px; color: #a0aec0; text-transform: uppercase; letter-spacing: 1px;">Your Photo</h3>
                    <div id="modalPhotoUploadArea" style="border: 2px dashed #4a4a4a; border-radius: 8px; padding: 24px; text-align: center; cursor: pointer; position: relative; transition: all 0.2s;">
                        <input type="file" id="modalPhotoInput" accept="image/*" style="opacity: 0; position: absolute; inset: 0; cursor: pointer; width: 100%; z-index: 2;">
                        <div id="modalPhotoPlaceholder">
                            <div style="font-size: 24px; margin-bottom: 8px;">??</div>
                            <div style="font-size: 14px; color: #a0aec0;">Click to upload your face</div>
                        </div>
                        <img id="modalPhotoPreview" style="display: none; width: 100%; height: auto; border-radius: 8px; object-fit: cover;" />
                    </div>
                </div>

                <div style="margin-top: auto;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px; color: #a0aec0; font-size: 14px;">
                        <span>Estimated cost:</span>
                        <span style="color: #e60000; font-weight: bold;">? 10 Credits</span>
                    </div>
                    <button id="modalSwapBtn" class="btn-primary" style="width: 100%; font-size: 16px; padding: 16px; background: #e60000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; display: flex; justify-content: center; align-items: center; gap: 8px;">
                        ? Swap My Face Into Video
                    </button>
                    <div id="modalErrorMsg" style="color: #ff3333; margin-top: 12px; font-size: 14px; text-align: center; display: none;"></div>
                </div>
            </div>
        </div>
    </div>
