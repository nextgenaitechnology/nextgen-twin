<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Sign Up - NextGen AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Outfit:wght@400;500;600;700&amp;display=swap" rel="stylesheet">

    <link rel="icon" href="assets/flame_icon.png" type="image/png">
</head>
<body class="auth-body">
    <div class="auth-container">
        <a href="explore.html" class="logo auth-logo">
            <svg width="40" height="40" viewBox="0 0 100 100" class="logo-icon">
                <path d="M50 15 C30 15 15 30 15 50 C15 70 30 85 50 85 C70 85 85 70 85 50" stroke="#e60000" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="80 120"></path>
                <path d="M50 25 C35 25 25 35 25 50 C25 65 35 75 50 75 C65 75 75 65 75 50" stroke="#e60000" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="60 100"></path>
            </svg>
            <div class="logo-text">
                <span class="next">Next</span><span class="gen">Gen</span>
            </div>
        </a>
        
        <div class="auth-box">
            <h2>Join the Revolution</h2>
            <p>Create an account to start generating and training AI videos.</p>
            
            <form action="explore.html">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" class="input-dark" placeholder="John Doe" required="">
                </div>
                
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" class="input-dark" placeholder="creator@example.com" required="">
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" class="input-dark" placeholder="••••••••" required="">
                </div>
                
                <button type="submit" class="btn-primary" style="margin-top: 8px;" >Create Account</button>
            </form>
            
            <div class="divider">
                <span>or continue with</span>
            </div>
            
            <div class="social-login">
                <button class="btn-social" >
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
                    Google
                </button>
            </div>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>

    <script src="hamburger.js"></script>

    <!-- MOBILE BOTTOM NAVIGATION -->
    <nav class="mobile-bottom-nav">
        <a href="explore.html" class="mobile-nav-item ">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
            Explore
        </a>
        <a href="collection.html" class="mobile-nav-item ">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            Collection
        </a>
        <a href="studio.html" class="mobile-nav-item ">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
            Studio
        </a>
        <a href="community.html" class="mobile-nav-item ">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            Community
        </a>
    </nav>

    <script src="app.js"></script>


</body></html>
