    <!-- Video Face Swap Modal (Playbox Style) -->
    <style>
        .swap-modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .swap-modal-content {
            background: #151618; width: 100%; max-width: 600px; border-radius: 20px; display: flex; flex-direction: column; position: relative; margin: 16px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.05);
        }
        .playbox-modal-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
        }
        .playbox-modal-title {
            color: white; font-weight: 700; font-size: 18px; margin: 0;
        }
        .playbox-modal-tags {
            display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap;
        }
        .playbox-modal-tag {
            background: #2a2b2f; color: #a0a0a0; font-size: 10px; padding: 4px 8px; border-radius: 12px; font-weight: 600;
        }
        .playbox-modal-body {
            display: flex; gap: 16px; height: 350px;
        }
        .playbox-col {
            flex: 1; border-radius: 16px; overflow: hidden; position: relative; background: #222327; display: flex; align-items: center; justify-content: center;
        }
        .playbox-upload-btn {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; cursor: pointer; z-index: 10;
        }
        .playbox-arrow {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: #4da3ff; z-index: 10; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .playbox-options {
            margin-top: 20px; display: flex; flex-direction: column; gap: 12px;
        }
        .playbox-checkbox {
            display: flex; align-items: center; gap: 10px; color: #ccc; font-size: 14px; cursor: pointer;
        }
        .playbox-generate-btn {
            margin-top: 20px; background: white; color: black; font-weight: 800; font-size: 16px; padding: 16px; border-radius: 12px; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: transform 0.2s;
        }
        .playbox-generate-btn:hover {
            transform: scale(1.02);
        }
        @media (max-width: 600px) {
            .playbox-modal-body { height: 250px; }
        }
    </style>
    <div id="videoSwapModal" class="swap-modal-overlay">
        <div class="swap-modal-content">
            <div class="playbox-modal-header">
                <div>
                    <h2 class="playbox-modal-title" id="modalTemplateTitle">Template Title</h2>
                    <div class="playbox-modal-tags">
                        <span class="playbox-modal-tag">@Playbox</span>
                        <span class="playbox-modal-tag">POV</span>
                        <span class="playbox-modal-tag">4k</span>
                    </div>
                </div>
                <button onclick="document.getElementById('videoSwapModal').style.display='none'" style="background: transparent; border: none; color: #666; font-size: 24px; cursor: pointer;">×</button>
            </div>

            <div class="playbox-modal-body">
                <!-- Left: User Photo -->

                    <label class="playbox-upload-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        Upload Image

                    </label>
                </div>
                
                <!-- Middle Arrow -->

                <!-- Right: Target Video -->
                <div class="playbox-col">
                    <video id="modalVideoPlayer" autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
                </div>
            </div>

            <div class="playbox-options">

            </div>

            </button>
            <div id="modalErrorMsg" style="color: #ff3333; margin-top: 12px; font-size: 14px; text-align: center; display: none;"></div>
        </div>
    </div>
